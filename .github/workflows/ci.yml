name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Use npm install for now because npm ci was rejecting your lockfile.
      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build website
        run: npm run build
